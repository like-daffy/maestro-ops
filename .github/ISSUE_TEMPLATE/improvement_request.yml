name: "💡 Improvement Request (기능 개선 제안)"
description: "Suggest an improvement or new feature. 기능 개선이나 새로운 기능을 제안해주세요."
title: "[Feature] "

body:
  - type: markdown
    attributes:
      value: |
        Please fill out the following information to help us understand your improvement request. 제안하시는 내용을 저희가 잘 이해할 수 있도록 아래 정보를 기입해주세요.

  - type: input
    id: version
    attributes:
      label: "Maestro Ops Version"
      placeholder: "ex) 2.0-b1"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: "Description (개선 사항 설명)"
      description: "Describe the improvement or feature you are suggesting. 제안하고자 하는 개선 사항이나 새로운 기능을 상세히 설명해주세요."
      placeholder: |
        - What is the current behavior? (현재 작동 방식이나 불편한 점은 무엇인가요?)
        - What is the expected behavior? (어떻게 개선되기를 원하시나요?)
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: "Use Case (활용 사례)"
      description: "How would this improvement be used? 왜 이 기능이 필요한지, 어떤 상황에서 유용하게 쓰일 수 있는지 구체적인 활용 사례를 알려주세요."
      placeholder: "When I use [feature], I want to [action] so that I can [benefit]... (제가 [기능]을 사용할 때, [행동]을 할 수 있으면 [이점]을 얻을 수 있습니다...)"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered (고려한 대안)"
      description: "Are there any alternative solutions you've considered? 고려해본 다른 대안점이나 임시 해결책이 있다면 알려주세요."
    validations:
      required: false
